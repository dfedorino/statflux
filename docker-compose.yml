services:
  db:
    image: postgres:16-alpine
    container_name: statflux-db

    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-statflux_db}
      POSTGRES_USER: ${POSTGRES_USER:-statflux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-statflux} -d ${POSTGRES_DB:-statflux_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statflux-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_BOT_WHITE_LIST: ${TELEGRAM_BOT_WHITE_LIST:-}

      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-statflux_db}
      DB_USER: ${POSTGRES_USER:-statflux}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:?YOUTUBE_API_KEY is required}

      VK_API_URL: ${VK_API_URL:?VK_API_URL is required}
      VK_API_TOKEN: ${VK_API_TOKEN:?VK_API_TOKEN is required}
      VK_API_VERSION: ${VK_API_VERSION:?VK_API_VERSION is required}

      RUTUBE_ACCESS_TOKEN: ${RUTUBE_ACCESS_TOKEN:?RUTUBE_ACCESS_TOKEN is required}

      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-60}

volumes:
  postgres_data:
